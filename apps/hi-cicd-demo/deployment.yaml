apiVersion: apps/v1
kind: Deployment
metadata:
  name: hi-cicd-demo


spec:
  replicas: 2

  selector:
    matchLabels:
      app: hi-cicd-demo

  template:
    metadata:
      labels:
        app: hi-cicd-demo

    spec:

      imagePullSecrets:
      - name: harbor-secret

      containers:

      - name: hi-cicd-demo

        image: harbor100.waltonbd.com:8443/demo01/hi-cicd-demo:latest

        imagePullPolicy: Always

     
        ports:

        - containerPort: 80

